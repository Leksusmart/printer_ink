services:
  postgres:
    image: postgres:17-alpine
    container_name: ink_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1357
      POSTGRES_DB: printer_ink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # Поменяли имя здесь
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: ink_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=printer_ink
      - DB_USER=postgres
      - DB_PASSWORD=1357
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: ink_frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
